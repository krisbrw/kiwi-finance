{% extends "_layout.html" %}
{% block title %}Log In — Kiwi Finance{% endblock %}

{% block head %}
<style>
.auth-page {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse 70% 50% at 60% 0%, rgba(22,163,74,0.07), transparent),
                radial-gradient(ellipse 50% 40% at 10% 100%, rgba(37,99,235,0.05), transparent),
                #f9fafb;
}
.auth-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
}
.auth-icon {
    width: 60px; height: 60px; border-radius: 16px;
    background: var(--green-bg); border: 2px solid var(--green-border);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; color: var(--green);
}
.auth-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
.auth-sub   { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 32px; }
.form-field { margin-bottom: 16px; }
.form-field label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px;
}
.form-field input {
    width: 100%; height: 44px; padding: 0 14px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--text);
    font: 14px/1 'Inter', sans-serif; outline: none;
    transition: border-color 150ms, box-shadow 150ms;
}
.form-field input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
}
.btn-submit {
    width: 100%; height: 46px; background: var(--green); border: none;
    border-radius: 10px; color: white; font: 600 15px 'Inter', sans-serif;
    cursor: pointer; margin-top: 8px;
    transition: background 150ms, transform 150ms;
}
.btn-submit:hover { background: var(--green-hover); transform: translateY(-1px); }
.auth-error {
    background: var(--red-bg); border: 1px solid #fecaca;
    color: var(--red-text); border-radius: 9px;
    padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
}
.auth-footer { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 24px; }
.auth-footer a { color: var(--green); font-weight: 600; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">
            <svg width="28" height="28"><use href="#kiwi-fruit"/></svg>
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Log in to your Kiwi Finance account</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com"
                       value="{{ email or '' }}" required autofocus>
            </div>
            <div class="form-field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="••••••••" required>
            </div>
            <button class="btn-submit" type="submit">Log In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Sign up free</a>
        </div>
    </div>
</div>
{% endblock %}
