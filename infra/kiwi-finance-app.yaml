AWSTemplateFormatVersion: '2010-09-09'
Description: Kiwi Finance - Application stack (IAM, Lambda, ECS cluster/service skeleton). ECS image deployments are handled outside CloudFormation via deploy.ps1.

Parameters:
  InfraStackName:
    Type: String
    Default: kiwi-finance-infra

  CodeBucket:
    Type: String
  CodeKey:
    Type: String

  PlaidClientId:
    Type: String
    NoEcho: true
  PlaidSecret:
    Type: String
    NoEcho: true
  PlaidEnv:
    Type: String
    Default: production
  SecretKey:
    Type: String
    NoEcho: true
  ExportBucket:
    Type: String
  AccountsPrefix:
    Type: String
    Default: accounts
  TransactionsPrefix:
    Type: String
    Default: transactions
  DBName:
    Type: String
    Default: kiwifinance
  DBUsername:
    Type: String
    Default: kiwidbadmin
  ScheduleExpression:
    Type: String
    Default: cron(0 13 * * ? *)
  LambdaMemorySize:
    Type: Number
    Default: 512
  LambdaTimeout:
    Type: Number
    Default: 120

Resources:

  DatabaseUrlSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/database-url"
      Description: Database connection info for Kiwi Finance
      SecretString: !Sub
        - '{"host":"${Host}","port":"5432","dbname":"${DBName}","username":"${DBUsername}","master_secret_arn":"${MasterArn}"}'
        - Host: !ImportValue
            Fn::Sub: "${InfraStackName}-AuroraEndpoint"
          MasterArn: !ImportValue
            Fn::Sub: "${InfraStackName}-AuroraMasterSecretArn"

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: KiwiLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatabaseUrlSecret
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rds!*"
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource:
                  - !Sub "arn:aws:s3:::${ExportBucket}/${AccountsPrefix}/*"
                  - !Sub "arn:aws:s3:::${ExportBucket}/${TransactionsPrefix}/*"
                  - !Sub "arn:aws:s3:::${ExportBucket}/migration/*"

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KiwiECSPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatabaseUrlSecret
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rds!*"
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource:
                  - !Sub "arn:aws:s3:::${ExportBucket}/${AccountsPrefix}/*"
                  - !Sub "arn:aws:s3:::${ExportBucket}/${TransactionsPrefix}/*"
                  - !Sub "arn:aws:s3:::${ExportBucket}/migration/*"

  KiwiFinanceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-daily-job"
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      VpcConfig:
        SecurityGroupIds:
          - !ImportValue
              Fn::Sub: "${InfraStackName}-AppSecurityGroup"
        SubnetIds:
          - !ImportValue
              Fn::Sub: "${InfraStackName}-PrivateSubnetA"
          - !ImportValue
              Fn::Sub: "${InfraStackName}-PrivateSubnetB"
      Environment:
        Variables:
          PLAID_CLIENT_ID: !Ref PlaidClientId
          PLAID_SECRET: !Ref PlaidSecret
          PLAID_ENV: !Ref PlaidEnv
          SECRET_KEY: !Ref SecretKey
          AWS_S3_BUCKET: !Ref ExportBucket
          AWS_S3_ACCOUNTS_PREFIX: !Ref AccountsPrefix
          AWS_S3_TRANSACTIONS_PREFIX: !Ref TransactionsPrefix
          DATABASE_URL_SECRET_ARN: !Ref DatabaseUrlSecret

  KiwiFinanceSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt KiwiFinanceFunction.Arn
          Id: KiwiFinanceLambdaTarget

  KiwiFinanceSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref KiwiFinanceFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt KiwiFinanceSchedule.Arn

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}-app"
      RetentionInDays: 30

Outputs:
  DatabaseUrlSecretArn:
    Value: !Ref DatabaseUrlSecret
    Export:
      Name: !Sub "${AWS::StackName}-DatabaseUrlSecretArn"

  ECSTaskExecutionRoleArn:
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ECSTaskExecutionRoleArn"

  ECSTaskRoleArn:
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ECSTaskRoleArn"

  ECSClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${AWS::StackName}-ECSClusterName"

  AppLogGroupName:
    Value: !Ref AppLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-AppLogGroupName"

  LambdaFunctionArn:
    Value: !GetAtt KiwiFinanceFunction.Arn
